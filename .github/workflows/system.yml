name: System Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  system:
    name: System Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SYSTEM_REGEX: '^(TestProxy_InstanceIsolation|TestOrchestrator_(HealthCheck|HashBasedIDs|PortAllocation|PortReuse|ListInstances|FirstRequestLazyChrome|AggregateTabsEndpoint|StopNonexistent|InstanceCleanup))$'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Google Chrome (deb, avoids snap hangs)
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo 'deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main' | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          echo "CHROME_BINARY=/usr/bin/google-chrome" >> $GITHUB_ENV

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: 🧪 Run system tests
        run: |
          echo "::group::System Tests Output"
          gotestsum --format testname --jsonfile system-events.json -- \
            -tags integration -v -timeout 15m -count=1 \
            -run "$SYSTEM_REGEX" ./tests/integration/
          echo "::endgroup::"
        env:
          CI: "true"
          BRIDGE_HEADLESS: "true"
          BRIDGE_NO_RESTORE: "true"
          PINCHTAB_TEST_PORT: "19869"
          PINCHTAB_TEST_RETRY: "true"
          PINCHTAB_ALLOW_EVALUATE: "true"
          PINCHTAB_ALLOW_MACRO: "true"
          PINCHTAB_ALLOW_DOWNLOAD: "true"
          PINCHTAB_ALLOW_UPLOAD: "true"
          PINCHTAB_ALLOW_SCREENCAST: "true"

      - name: 📋 Add summary
        if: always()
        run: |
          total=0
          pass=0
          fail=0
          skip=0

          if [ -s system-events.json ]; then
            read total pass fail skip <<<"$(jq -r 'select(.Test != null and (.Action == "pass" or .Action == "fail" or .Action == "skip")) | [.Package, .Test, .Action] | @tsv' system-events.json \
              | awk -F'\t' 'NF == 3 { key = $1 "\t" $2; status[key] = $3 } END { for (k in status) { t++; if (status[k] == "pass") p++; else if (status[k] == "fail") f++; else if (status[k] == "skip") s++; } printf "%d %d %d %d\n", t + 0, p + 0, f + 0, s + 0 }')"
          fi

          echo "### ✅ System Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status**: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner**: ubuntu-latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Port**: 19869" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Regex**: \`$SYSTEM_REGEX\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Total tests**: $total" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Passed**: $pass" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Failed**: $fail" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Skipped**: $skip" >> "$GITHUB_STEP_SUMMARY"
