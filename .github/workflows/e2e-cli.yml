name: E2E CLI Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-cli.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-cli.yml'

jobs:
  e2e-cli:
    name: CLI End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build pinchtab binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o tests/e2e/runner-cli/pinchtab ./cmd/pinchtab

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run CLI E2E tests
        working-directory: tests/e2e
        run: |
          docker compose -f docker-compose-cli.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from runner

      - name: Copy results from container
        if: always()
        working-directory: tests/e2e
        run: |
          docker compose -f docker-compose-cli.yml cp runner:/results ./results || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-e2e-results
          path: tests/e2e/results/
          retention-days: 7

      - name: Show logs on failure
        if: failure()
        working-directory: tests/e2e
        run: |
          echo "=== CLI Runner Logs ==="
          docker compose -f docker-compose-cli.yml logs runner || true
          echo "=== Pinchtab Logs ==="
          docker compose -f docker-compose-cli.yml logs pinchtab || true
